<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eddy Dashboard</title>
    <style>
        body { 
            background-color: #000; color: #fff; margin: 0; display: flex; flex-direction: column; 
            height: 100vh; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; transition: transform 3s ease-in-out; 
        }
        
        #blackout { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #000; z-index: 999999; display: none; }
        #alarm-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; box-shadow: inset 0 0 120px 30px #ff0000; z-index: 999998; pointer-events: none; display: none; animation: alertaPulsar 0.6s infinite alternate; }
        @keyframes alertaPulsar { from { opacity: 0.2; } to { opacity: 1; } }
        
        #radio-container { position: absolute; top: 5vh; left: 3vw; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        #btn-radio { background: rgba(255, 255, 255, 0.1); color: #aaa; border: 1px solid rgba(255, 255, 255, 0.2); padding: 2vh 4vh; border-radius: 30px; font-size: 3vh; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); transition: all 0.3s ease; }
        #btn-radio:active { background: rgba(255, 255, 255, 0.3); }
        #volume-container { display: none; flex-direction: column; align-items: center; margin-top: 2vh; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); padding: 3vh 2vh; border-radius: 40px; height: 35vh; backdrop-filter: blur(10px); }
        #volume-slider { -webkit-appearance: slider-vertical; width: 5vh; height: 100%; margin: 2vh 0; accent-color: #ff9f43; cursor: pointer; }
        .vol-icon { font-size: 4vh; }

        .header-container { text-align: center; margin-top: 6vh; display: flex; flex-direction: column; align-items: center; }
        #data-atual { font-size: 6vh; color: #b39ddb; text-transform: capitalize; margin-bottom: -3vh; text-shadow: 0 0 15px rgba(179, 157, 219, 0.4); }
        #relogio { font-size: 33vh; font-weight: 900; letter-spacing: -3px; text-shadow: 0 0 25px rgba(255, 255, 255, 0.3); margin: 0; }
        .pisca { animation: piscar 1s step-start infinite; }
        @keyframes piscar { 50% { opacity: 0.2; } }
        #chuva-hoje { font-size: 5vh; color: #48dbfb; font-weight: 600; text-shadow: 0 0 15px rgba(72, 219, 251, 0.4); margin-top: -3vh; }
        
        .container-temps { display: flex; justify-content: space-around; align-items: center; width: 100%; margin-top: auto; margin-bottom: 8vh; }
        .box { text-align: center; display: flex; flex-direction: column; align-items: center; }
        .box-in .label { color: #ff9f43; font-size: 4vh; font-weight: bold; text-shadow: 0 0 15px rgba(255, 159, 67, 0.5); margin-bottom: -1vh; }
        .box-in .temp-text { font-size: 16vh; font-weight: bold; }
        .box-out .label { color: #0abde3; font-size: 4vh; font-weight: bold; text-shadow: 0 0 15px rgba(10, 189, 227, 0.5); margin-bottom: -1vh; }
        .box-out .temp-text { font-size: 16vh; font-weight: bold; }
        .out-temp-row { display: flex; align-items: center; justify-content: center; }
        #weather-icon { width: 15vh; height: 15vh; display: none; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }

        /* ------------------------------------- */
        /* MODO EDDY COM IMAGEM ORIGINAL         */
        /* ------------------------------------- */
        #eddy-fullscreen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #fff; /* O fundo branco */
            z-index: 9999999; display: none; justify-content: center; align-items: center;
            overflow: hidden; /* Corta o que sair fora do ecrã */
        }
        
        #eddy-img {
            height: 100vh; 
            object-fit: cover;
            /* O ZOOM MÁGICO: Estica a imagem para o branco desaparecer nas bordas */
            transform: scale(2.8); 
            transform-origin: center;
            transition: transform 0.05s linear; /* Para a animação da fala */
        }

        /* Indicador de Microfone Ativo */
        #mic-status {
            position: fixed; bottom: 2vh; right: 2vw; width: 1.5vh; height: 1.5vh; 
            background-color: red; border-radius: 50%; opacity: 0.5; z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="blackout"></div>
    <div id="alarm-overlay"></div>
    <div id="mic-status" title="Microfone a ouvir"></div>

    <audio id="audio-antena1" src="https://radiocast.rtp.pt/antena180a.mp3" preload="none"></audio>
    
    <div id="radio-container">
        <button id="btn-radio" onclick="toggleRadio()">📻 Antena 1</button>
        <div id="volume-container">
            <span class="vol-icon">🔊</span>
            <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5">
            <span class="vol-icon">🔈</span>
        </div>
    </div>

    <div class="header-container">
        <div id="data-atual">-- de --</div>
        <div id="relogio">00<span class="pisca">:</span>00</div>
        <div id="chuva-hoje">🌧️ Chuva hoje: --%</div>
    </div>
    
    <div class="container-temps">
        <div class="box box-in">
            <span class="label">IN</span>
            <div class="temp-text"><span id="temp-in">--</span>°C</div>
        </div>
        <div class="box box-out">
            <span class="label">OUT</span>
            <div class="out-temp-row">
                <img id="weather-icon" src="" alt="estado do tempo">
                <div class="temp-text"><span id="temp-out">--</span>°C</div>
            </div>
        </div>
    </div>

    <div id="eddy-fullscreen">
        <img id="eddy-img" src="eddy.png" alt="Eddy">
    </div>

    <script>
        const HUE_IP = '192.168.1.183';
        const HUE_TOKEN = 'ryqpfV2hzUw3ZkN-twiFBEMPUu-cN7CxHMFDaVSa';
        const ID_DA_LAMPADA = 16; 

        // Rádio e Volume
        const audioRadio = document.getElementById('audio-antena1');
        const btnRadio = document.getElementById('btn-radio');
        const volContainer = document.getElementById('volume-container');
        const volumeSlider = document.getElementById('volume-slider');
        audioRadio.volume = 0.5;

        function toggleRadio() {
            if (audioRadio.paused) {
                audioRadio.play();
                btnRadio.innerHTML = '⏸️ A Tocar';
                btnRadio.style.color = '#ff9f43';
                btnRadio.style.borderColor = '#ff9f43';
                volContainer.style.display = 'flex'; 
            } else {
                audioRadio.pause();
                btnRadio.innerHTML = '📻 Antena 1';
                btnRadio.style.color = '#aaa';
                btnRadio.style.borderColor = 'rgba(255, 255, 255, 0.2)';
                volContainer.style.display = 'none'; 
            }
        }
        volumeSlider.addEventListener('input', function() { audioRadio.volume = this.value; });

        // Alarme Energia
        let eletricidadeLigada = true;
        function aplicarEstadosDeAlarme(estaACarregar) {
            const blackoutDiv = document.getElementById('blackout');
            const alarmOverlay = document.getElementById('alarm-overlay');
            if (!eletricidadeLigada) { blackoutDiv.style.display = 'block'; alarmOverlay.style.display = 'none'; } 
            else if (eletricidadeLigada && !estaACarregar) { blackoutDiv.style.display = 'none'; alarmOverlay.style.display = 'block'; } 
            else { blackoutDiv.style.display = 'none'; alarmOverlay.style.display = 'none'; }
        }
        async function monitorarHueBridge() {
            try {
                const url = `http://${HUE_IP}/api/${HUE_TOKEN}/lights/${ID_DA_LAMPADA}`;
                const response = await fetch(url);
                const data = await response.json();
                eletricidadeLigada = !(data.state && data.state.reachable === false);
            } catch (e) { eletricidadeLigada = false; }
            if ('getBattery' in navigator) navigator.getBattery().then(b => aplicarEstadosDeAlarme(b.charging));
        }
        if ('getBattery' in navigator) {
            navigator.getBattery().then(function(battery) {
                battery.addEventListener('chargingchange', function() { aplicarEstadosDeAlarme(battery.charging); });
            });
        }

        // Relógio e Clima
        function updateClockAndDate() {
            const agora = new Date();
            const horas = String(agora.getHours()).padStart(2, '0');
            const minutos = String(agora.getMinutes()).padStart(2, '0');
            document.getElementById('relogio').innerHTML = `${horas}<span class="pisca">:</span>${minutos}`;
            const opcoesData = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('data-atual').innerText = agora.toLocaleDateString('pt-PT', opcoesData);
        }
        async function getOutdoorTemp() {
            try {
                const url = `https://api.openweathermap.org/data/2.5/weather?q=Santo+Antonio+dos+Cavaleiros,PT&appid=8a3fe8fecca47dfc4859d6c3ef1a0214&units=metric&lang=pt`;
                const response = await fetch(url);
                const data = await response.json();
                document.getElementById('temp-out').innerText = Math.round(data.main.temp);
                const iconCode = data.weather[0].icon;
                const iconElement = document.getElementById('weather-icon');
                iconElement.src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
                iconElement.style.display = 'block'; 
            } catch (e) { document.getElementById('temp-out').innerText = "Err"; }
        }
        async function getRainChance() {
            try {
                const url = `https://api.openweathermap.org/data/2.5/forecast?q=Santo+Antonio+dos+Cavaleiros,PT&appid=8a3fe8fecca47dfc4859d6c3ef1a0214&units=metric&lang=pt`;
                const response = await fetch(url);
                const data = await response.json();
                let maxPop = 0;
                for(let i = 0; i < 4; i++) { if(data.list[i] && data.list[i].pop > maxPop) maxPop = data.list[i].pop; }
                document.getElementById('chuva-hoje').innerText = `🌧️ Chuva hoje: ${Math.round(maxPop * 100)}%`;
            } catch (e) { document.getElementById('chuva-hoje').innerText = `🌧️ Chuva hoje: Err`; }
        }
        async function getIndoorTemp() {
            try {
                const url = `http://${HUE_IP}/api/${HUE_TOKEN}/sensors/34`;
                const response = await fetch(url);
                const data = await response.json();
                document.getElementById('temp-in').innerText = Math.round(data.state.temperature / 100);
            } catch (e) { document.getElementById('temp-in').innerText = "Err"; }
        }
        function aplicarAntiBurnIn() {
            const eixoX = Math.floor(Math.random() * 13) - 6; const eixoY = Math.floor(Math.random() * 13) - 6;
            document.body.style.transform = `translate(${eixoX}px, ${eixoY}px)`;
        }

        // -----------------------------------------------------
        // EDDY AI: MICROFONE E ANIMAÇÃO
        // -----------------------------------------------------
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const micStatus = document.getElementById('mic-status');
        let reconhecedorAtivo = false;

        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = true; 
            recognition.interimResults = true; 
            recognition.lang = 'pt-PT';

            recognition.onstart = function() { micStatus.style.backgroundColor = 'red'; reconhecedorAtivo = true; };
            recognition.onerror = function() { micStatus.style.backgroundColor = 'gray'; };
            recognition.onend = function() { 
                micStatus.style.backgroundColor = 'gray';
                reconhecedorAtivo = false;
                setTimeout(() => { recognition.start(); }, 1000); // Tenta reiniciar passado 1 segundo
            };

            recognition.onresult = function(event) {
                let transcricao = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    transcricao += event.results[i][0].transcript;
                }
                
                const frases = transcricao.toLowerCase();
                // Ouve "Eddy" e cancela o reconhecimento para não se ouvir a ele próprio
                if (frases.match(/(eddy|edi|eddie|edy|ady|é de|é di|adi|teddy|hedy)/)) {
                    recognition.abort(); 
                    acordarEddy();
                }
            };
            
            // Tenta arrancar o microfone
            try { recognition.start(); } catch(e) {}
        }

        const eddyScreen = document.getElementById('eddy-fullscreen');
        const eddyImg = document.getElementById('eddy-img');
        let lipSyncInterval;

        function acordarEddy() {
            eddyScreen.style.display = 'flex';
            
            const resposta = "Sim? Mais uma tarefa inútil para o teu assistente superior fazer?";
            const synth = window.speechSynthesis;
            const utterThis = new SpeechSynthesisUtterance(resposta);
            utterThis.lang = 'pt-PT';
            utterThis.rate = 1.1; 

            utterThis.onstart = function() {
                // LIP-SYNC EFEITO HOLOGRÁFICO (Sem coordenadas, distorce o Y da imagem)
                lipSyncInterval = setInterval(() => {
                    // Mantém o scale(2.8) para o zoom, e adiciona um scaleY aleatório entre 1.0 e 1.15
                    const esticão = 1 + (Math.random() * 0.15);
                    eddyImg.style.transform = `scale(2.8) scaleY(${esticão})`;
                }, 60);
            };

            utterThis.onend = function() {
                clearInterval(lipSyncInterval);
                eddyImg.style.transform = 'scale(2.8)'; // Volta ao tamanho normal
                setTimeout(() => { eddyScreen.style.display = 'none'; }, 2000);
            };

            // Falar!
            synth.speak(utterThis);
        }

        // Iniciar loops
        setInterval(updateClockAndDate, 1000);
        setInterval(getOutdoorTemp, 600000); 
        setInterval(getRainChance, 600000);  
        setInterval(getIndoorTemp, 60000);   
        setInterval(aplicarAntiBurnIn, 600000); 
        setInterval(monitorarHueBridge, 5000); 
        
        updateClockAndDate(); getOutdoorTemp(); getRainChance(); getIndoorTemp(); monitorarHueBridge(); 
    </script>
</body>
</html>
