<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eddy Dashboard</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            transition: transform 3s ease-in-out; 
        }
        
        /* 1. Cortina de Apagão Elétrico */
        #blackout {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #000;
            z-index: 999999; 
            display: none; 
        }

        /* 2. Sirene Visual de Cabo Desligado (Bordas Vermelhas) */
        #alarm-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            box-shadow: inset 0 0 120px 30px #ff0000; 
            z-index: 999998; 
            pointer-events: none; 
            display: none;
            animation: alertaPulsar 0.6s infinite alternate;
        }
        @keyframes alertaPulsar {
            from { opacity: 0.2; }
            to { opacity: 1; }
        }
        
        /* Contentor da Rádio e Volume */
        #radio-container {
            position: absolute;
            top: 30px; left: 30px;
            display: flex; flex-direction: column; align-items: center;
            z-index: 10;
        }

        #btn-radio {
            background: rgba(255, 255, 255, 0.1);
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px 35px; border-radius: 30px;
            font-size: 1.8rem; font-weight: bold; cursor: pointer;
            backdrop-filter: blur(5px); transition: all 0.3s ease;
        }
        #btn-radio:active { background: rgba(255, 255, 255, 0.3); }

        /* Barra de Volume */
        #volume-container {
            display: none; flex-direction: column; align-items: center;
            margin-top: 20px; background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 25px 15px;
            border-radius: 40px; height: 350px; backdrop-filter: blur(10px);
        }
        #volume-slider {
            -webkit-appearance: slider-vertical; 
            width: 40px; height: 100%; margin: 20px 0;
            accent-color: #ff9f43; cursor: pointer;
        }
        .vol-icon { font-size: 2.5rem; }

        /* Restante Interface */
        .header-container { text-align: center; margin-top: 40px; display: flex; flex-direction: column; align-items: center; }
        #data-atual { font-size: 3.5rem; color: #b39ddb; text-transform: capitalize; margin-bottom: -30px; text-shadow: 0 0 15px rgba(179, 157, 219, 0.4); }
        #relogio { font-size: 17rem; font-weight: 900; letter-spacing: -3px; text-shadow: 0 0 25px rgba(255, 255, 255, 0.3); margin: 0; }
        .pisca { animation: piscar 1s step-start infinite; }
        @keyframes piscar { 50% { opacity: 0.2; } }
        #chuva-hoje { font-size: 2.8rem; color: #48dbfb; font-weight: 600; text-shadow: 0 0 15px rgba(72, 219, 251, 0.4); margin-top: -15px; }
        .container-temps { display: flex; justify-content: space-around; align-items: center; width: 100%; margin-top: auto; margin-bottom: 80px; }
        .box { text-align: center; display: flex; flex-direction: column; align-items: center; }
        .box-in .label { color: #ff9f43; font-size: 2.8rem; font-weight: bold; text-shadow: 0 0 15px rgba(255, 159, 67, 0.5); margin-bottom: -10px; }
        .box-in .temp-text { font-size: 8rem; font-weight: bold; }
        .box-out .label { color: #0abde3; font-size: 2.8rem; font-weight: bold; text-shadow: 0 0 15px rgba(10, 189, 227, 0.5); margin-bottom: -10px; }
        .box-out .temp-text { font-size: 8rem; font-weight: bold; }
        .out-temp-row { display: flex; align-items: center; justify-content: center; }
        #weather-icon { width: 110px; height: 110px; display: none; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
    </style>
</head>
<body>

    <div id="blackout"></div>
    <div id="alarm-overlay"></div>

    <audio id="audio-antena1" src="https://radiocast.rtp.pt/antena180a.mp3" preload="none"></audio>
    <audio id="audio-alarme" src="https://actions.google.com/sounds/v1/alarms/spaceship_alarm.ogg" loop preload="auto"></audio>
    
    <div id="radio-container">
        <button id="btn-radio" onclick="toggleRadio()">📻 Antena 1</button>
        <div id="volume-container">
            <span class="vol-icon">🔊</span>
            <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5">
            <span class="vol-icon">🔈</span>
        </div>
    </div>

    <div class="header-container">
        <div id="data-atual">-- de --</div>
        <div id="relogio">00<span class="pisca">:</span>00</div>
        <div id="chuva-hoje">🌧️ Chuva hoje: --%</div>
    </div>
    
    <div class="container-temps">
        <div class="box box-in">
            <span class="label">IN</span>
            <div class="temp-text"><span id="temp-in">--</span>°C</div>
        </div>

        <div class="box box-out">
            <span class="label">OUT</span>
            <div class="out-temp-row">
                <img id="weather-icon" src="" alt="estado do tempo">
                <div class="temp-text"><span id="temp-out">--</span>°C</div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES
        const HUE_IP = '192.168.1.183';
        const HUE_TOKEN = 'ryqpfV2hzUw3ZkN-twiFBEMPUu-cN7CxHMFDaVSa';
        const ID_DA_LAMPADA = 16; 

        // 1. Controlo da Rádio e Volume
        const audioRadio = document.getElementById('audio-antena1');
        const btnRadio = document.getElementById('btn-radio');
        const volContainer = document.getElementById('volume-container');
        const volumeSlider = document.getElementById('volume-slider');
        
        audioRadio.volume = 0.5;

        function toggleRadio() {
            if (audioRadio.paused) {
                audioRadio.play();
                btnRadio.innerHTML = '⏸️ A Tocar';
                btnRadio.style.color = '#ff9f43';
                btnRadio.style.borderColor = '#ff9f43';
                volContainer.style.display = 'flex'; 
            } else {
                audioRadio.pause();
                btnRadio.innerHTML = '📻 Antena 1';
                btnRadio.style.color = '#aaa';
                btnRadio.style.borderColor = 'rgba(255, 255, 255, 0.2)';
                volContainer.style.display = 'none'; 
            }
        }

        volumeSlider.addEventListener('input', function() {
            audioRadio.volume = this.value;
        });

        // 2. Sistema Cruzado de Energia e Bateria (Com Gatilho Instantâneo)
        let eletricidadeLigada = true;
        let alarmeA_Tocar = false;
        const audioAlarme = document.getElementById('audio-alarme');

        // Esta função centraliza a decisão visual e sonora
        function aplicarEstadosDeAlarme(estaACarregar) {
            const blackoutDiv = document.getElementById('blackout');
            const alarmOverlay = document.getElementById('alarm-overlay');

            if (!eletricidadeLigada) {
                // Apagão Geral: Cortina Preta e cala a boca à sirene
                blackoutDiv.style.display = 'block';
                alarmOverlay.style.display = 'none';
                if (alarmeA_Tocar) { audioAlarme.pause(); alarmeA_Tocar = false; }
            } 
            else if (eletricidadeLigada && !estaACarregar) {
                // Luz de casa ligada + Cabo desconectado = ALARME MÁXIMO!
                blackoutDiv.style.display = 'none';
                alarmOverlay.style.display = 'block';
                if (!alarmeA_Tocar) { 
                    audioAlarme.play(); 
                    alarmeA_Tocar = true; 
                }
            } 
            else {
                // Tudo Perfeito: Tira as cortinas e cala a sirene
                blackoutDiv.style.display = 'none';
                alarmOverlay.style.display = 'none';
                if (alarmeA_Tocar) { 
                    audioAlarme.pause(); 
                    audioAlarme.currentTime = 0; 
                    alarmeA_Tocar = false; 
                }
            }
        }

        // Monitoriza a Lâmpada a cada 5 segundos
        async function monitorarHueBridge() {
            try {
                const url = `http://${HUE_IP}/api/${HUE_TOKEN}/lights/${ID_DA_LAMPADA}`;
                const response = await fetch(url);
                const data = await response.json();
                
                eletricidadeLigada = !(data.state && data.state.reachable === false);
            } catch (e) { 
                eletricidadeLigada = false; 
            }

            if ('getBattery' in navigator) {
                navigator.getBattery().then(b => aplicarEstadosDeAlarme(b.charging));
            }
        }

        // Gatilho INSTANTÂNEO para quando o cabo é puxado ou inserido
        if ('getBattery' in navigator) {
            navigator.getBattery().then(function(battery) {
                battery.addEventListener('chargingchange', function() {
                    aplicarEstadosDeAlarme(battery.charging);
                });
            });
        }

        // 3. Meteorologia, Relógio e Burn-in (inalterados)
        function updateClockAndDate() {
            const agora = new Date();
            const horas = String(agora.getHours()).padStart(2, '0');
            const minutos = String(agora.getMinutes()).padStart(2, '0');
            document.getElementById('relogio').innerHTML = `${horas}<span class="pisca">:</span>${minutos}`;
            const opcoesData = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('data-atual').innerText = agora.toLocaleDateString('pt-PT', opcoesData);
        }

        async function getOutdoorTemp() {
            try {
                const url = `https://api.openweathermap.org/data/2.5/weather?q=Santo+Antonio+dos+Cavaleiros,PT&appid=8a3fe8fecca47dfc4859d6c3ef1a0214&units=metric&lang=pt`;
                const response = await fetch(url);
                const data = await response.json();
                document.getElementById('temp-out').innerText = Math.round(data.main.temp);
                const iconCode = data.weather[0].icon;
                const iconElement = document.getElementById('weather-icon');
                iconElement.src = `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
                iconElement.style.display = 'block'; 
            } catch (e) { document.getElementById('temp-out').innerText = "Err"; }
        }

        async function getRainChance() {
            try {
                const url = `https://api.openweathermap.org/data/2.5/forecast?q=Santo+Antonio+dos+Cavaleiros,PT&appid=8a3fe8fecca47dfc4859d6c3ef1a0214&units=metric&lang=pt`;
                const response = await fetch(url);
                const data = await response.json();
                let maxPop = 0;
                for(let i = 0; i < 4; i++) {
                    if(data.list[i] && data.list[i].pop > maxPop) maxPop = data.list[i].pop;
                }
                const chance = Math.round(maxPop * 100);
                document.getElementById('chuva-hoje').innerText = `🌧️ Chuva hoje: ${chance}%`;
            } catch (e) { document.getElementById('chuva-hoje').innerText = `🌧️ Chuva hoje: Err`; }
        }

        async function getIndoorTemp() {
            try {
                const url = `http://${HUE_IP}/api/${HUE_TOKEN}/sensors/34`;
                const response = await fetch(url);
                const data = await response.json();
                document.getElementById('temp-in').innerText = Math.round(data.state.temperature / 100);
            } catch (e) { document.getElementById('temp-in').innerText = "Err"; }
        }

        function aplicarAntiBurnIn() {
            const eixoX = Math.floor(Math.random() * 13) - 6; 
            const eixoY = Math.floor(Math.random() * 13) - 6;
            document.body.style.transform = `translate(${eixoX}px, ${eixoY}px)`;
        }

        // Iniciar tudo
        setInterval(updateClockAndDate, 1000);
        setInterval(getOutdoorTemp, 600000); 
        setInterval(getRainChance, 600000);  
        setInterval(getIndoorTemp, 60000);   
        setInterval(aplicarAntiBurnIn, 600000); 
        setInterval(monitorarHueBridge, 5000); 
        
        updateClockAndDate();
        getOutdoorTemp();
        getRainChance();
        getIndoorTemp();
        monitorarHueBridge(); 
    </script>
</body>
</html>
